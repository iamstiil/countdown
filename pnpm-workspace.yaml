packages:
  - .

# Dependencies allowed to run install/postinstall build scripts.
# Replaces the v10 `onlyBuiltDependencies` setting (removed in pnpm v11).
allowBuilds:
  '@swc/core': true
  '@tailwindcss/oxide': true
  esbuild: true
  msw: true
  unrs-resolver: true

# Supply-chain security (migrated from .npmrc 2026-05-07)
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - next
  - react
  - react-dom
  - '@types/react'
  - '@types/react-dom'
  - typescript
  - vite
  - vitest
  - '@vitejs/plugin-react'
  - eslint
  - prettier
  - tailwindcss
  - '@tanstack/react-query'
  - zod
  - react-hook-form
  - eslint-config-ts-prefixer
  - '@laststance/redux-storage-middleware'
  - '@laststance/react-next-eslint-plugin'
verifyStoreIntegrity: true
